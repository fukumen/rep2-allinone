name: Build and Publish Packages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [p2-php-update]

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Log Upstream Trigger Info
        if: github.event.client_payload.run_id
        run: |
          echo "Triggered by p2-php run: https://github.com/fukumen/p2-php/actions/runs/${{ github.event.client_payload.run_id }}"
          echo "Source SHA: ${{ github.event.client_payload.sha }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download existing repository
        continue-on-error: true
        run: |
          git clone --depth 1 -b gh-pages https://github.com/${{ github.repository }}.git repo
          rm -rf repo/.git

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install APT and RPM Repository Tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils rpm createrepo-c tree zip

      - name: Build Packages
        run: |
          make clean
          make RUN_ID=${{ github.run_id }} RUN_NUMBER=${{ github.run_number }} ARCH=amd64 deb
          make RUN_ID=${{ github.run_id }} RUN_NUMBER=${{ github.run_number }} ARCH=arm64 deb
          make RUN_ID=${{ github.run_id }} RUN_NUMBER=${{ github.run_number }} ARCH=amd64 rpm
          make RUN_ID=${{ github.run_id }} RUN_NUMBER=${{ github.run_number }} ARCH=arm64 rpm
          rm -rf dist/p2-php
          make RUN_ID=${{ github.run_id }} RUN_NUMBER=${{ github.run_number }} windows

      - name: Create APT and RPM Repository structures
        run: |
          # Import GPG key if available
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
            gpg --batch --armor --export fukumen@gmail.com > fukumen.gpg.key
            
            # Setup RPM macros for signing
            echo "%_signature gpg" > ~/.rpmmacros
            echo "%_gpg_name fukumen@gmail.com" >> ~/.rpmmacros
            echo "%__gpg_sign_cmd %{__gpg} gpg --batch --pinentry-mode loopback --no-armor %{?_gpg_digest_algo:--digest-algo %{_gpg_digest_algo}} --no-secmem-warning -u \"%{_gpg_name}\" -sbo %{__signature_filename} %{__plaintext_filename}" >> ~/.rpmmacros
            
            # Sign RPM packages
            rpm --addsign dist/*.rpm || echo "Warning: RPM signing failed or skipped"
          else
            echo "Warning: GPG_PRIVATE_KEY is not set. Packages will be unsigned."
          fi

          # --- APT Repository (.deb) ---
          mkdir -p repo/apt
          cp dist/*.deb repo/apt/
          [ -f fukumen.gpg.key ] && cp fukumen.gpg.key repo/apt/
          
          # Prune old DEB packages (keep latest 5 per architecture)
          for arch in amd64 arm64; do
            ls -1 repo/apt/rep2-allinone_*_${arch}.deb 2>/dev/null | \
              while read -r file; do
                ts=$(echo "$file" | grep -oP '\+\K\d{12}')
                echo "$ts $file"
              done | sort -rn | tail -n +6 | awk '{print $2}' | xargs -r rm -v -f
          done

          cd repo/apt
          dpkg-scanpackages --multiversion . /dev/null > Packages
          gzip -9kf Packages
          apt-ftparchive release . > Release
          
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            gpg --batch --pinentry-mode loopback --yes -abs -u fukumen@gmail.com -o Release.gpg Release
            gpg --batch --pinentry-mode loopback --yes -abs -u fukumen@gmail.com --clearsign -o InRelease Release
          fi
          cd ../../

          # --- RPM Repository (.rpm) ---
          mkdir -p repo/rpm
          cp dist/*.rpm repo/rpm/ 2>/dev/null || true
          [ -f fukumen.gpg.key ] && cp fukumen.gpg.key repo/rpm/
          
          # Prune old RPM packages (keep latest 5 per architecture)
          for arch in x86_64 aarch64; do
            ls -1 repo/rpm/rep2-allinone-*.${arch}.rpm 2>/dev/null | \
              while read -r file; do
                ts=$(echo "$file" | grep -oP '\.\K\d{12}(?=\.'${arch}'\.rpm)')
                echo "$ts $file"
              done | sort -rn | tail -n +6 | awk '{print $2}' | xargs -r rm -v -f
          done

          cd repo/rpm
          createrepo_c .
          
          # Sign RPM repository metadata
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            gpg --batch --pinentry-mode loopback --yes --detach-sign --armor -u fukumen@gmail.com repodata/repomd.xml
          fi
          cd ../../

          # --- ZIP / Others ---
          mkdir -p repo/zip
          cp dist/*.zip repo/zip/ 2>/dev/null || true
          cp dist/php-checksums.txt repo/php-checksums-${{ github.run_number }}.txt 2>/dev/null || true

          # Prune old checksum files (keep latest 5)
          ls -1 repo/php-checksums-*.txt 2>/dev/null | sort -Vrn | tail -n +6 | xargs -r rm -v -f

          # Prune old ZIP packages (keep latest 5 per architecture)
          for arch in amd64 arm64; do
            ls -1 repo/zip/rep2-allinone-*-windows-${arch}.zip 2>/dev/null | \
              while read -r file; do
                ts=$(echo "$file" | grep -oP '\+\K\d{12}')
                echo "$ts $file"
              done | sort -rn | tail -n +6 | awk '{print $2}' | xargs -r rm -v -f
          done

      - name: Generate HTML Indexes
        run: |
          cd repo
          tree -H '.' -L 2 --noreport --charset utf-8 -T "rep2-allinone Packages" -o index.html
          cd apt && tree -H '.' -L 1 --noreport --charset utf-8 -T "rep2-allinone APT Repository" -o index.html && cd ..
          cd rpm && tree -H '.' -L 1 --noreport --charset utf-8 -T "rep2-allinone RPM Repository" -o index.html && cd ..
          cd zip && tree -H '.' -L 1 --noreport --charset utf-8 -T "rep2-allinone ZIP Downloads" -o index.html && cd ..

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: false
          force_orphan: true
          commit_message: "Deploy repositories (triggered by p2-php: ${{ github.event.client_payload.sha || 'manual' }})"

      - name: Publish to GitHub Releases (latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 既存の latest リリースとタグを削除 (失敗しても無視)
          gh release delete latest -y --cleanup-tag || true
          
          cp dist/php-checksums.txt dist/php-checksums-${{ github.run_number }}.txt
          
          # 新しく latest リリースを作成してアセットをアップロード
          gh release create latest dist/*.deb dist/*.rpm dist/*.zip dist/php-checksums-${{ github.run_number }}.txt \
            --title "Latest Build" \
            --notes "Automated build triggered by repository updates."